# Claude Code Agent Coordination Config
# Defines: task dispatch rules, cross-consultation, conflict resolution, and quality gates
# for a 43-agent multi-stack development team.
#
# Stacks covered: Java/Spring Boot, NestJS, Python/FastAPI, Agentic AI (LangChain/LangGraph),
#                 Angular, Flutter, React Native, PostgreSQL, pgvector, Weaviate,
#                 Terraform/GCP, Browser Testing, Architecture, and cross-cutting utilities.
#
# Rule precedence when agents conflict:
#   security-reviewer > postgresql-database-reviewer > spring-reactive-reviewer >
#   nestjs-reviewer > riverpod-reviewer > code-reviewer
version: "1.0"
last-updated: "2026-03-15"

orchestration_mode: hierarchical  # Hierarchical with peer-to-peer consultation between same-tier agents.
                                   # P1 implementers own the task. P2 specialists are consulted as needed.
                                   # P3 reviewers run post-implementation. P4 utilities support any tier.

# ─────────────────────────────────────────────────────────────────────────────
# AGENT REGISTRY
# Agents are grouped into 4 priority tiers.
# Tier determines dispatch order, not model quality.
# ─────────────────────────────────────────────────────────────────────────────
agent_registry:

  # P1 — Core implementers. Handle the majority of day-to-day coding tasks.
  # These are dispatched first based on file pattern or stack signal.
  p1_core:
    - name: java-spring-api
      domain: Java 21, Spring Boot 3.5.x WebFlux, REST APIs, reactive services
      model: sonnet
      can_write: true

    - name: nestjs-api
      domain: NestJS 11.x, Fastify, Prisma ORM, TypeScript 5.x backend
      model: sonnet
      can_write: true

    - name: python-dev
      domain: Python 3.14, FastAPI, Flask, Pydantic v2, SQLAlchemy async, scripts
      model: sonnet
      can_write: true

    - name: agentic-ai-dev
      domain: LangChain v1.2.8, LangGraph v1.0.7, FastAPI AI agents, tool calling
      model: sonnet
      can_write: true

    - name: angular-spa
      domain: Angular 21.x SPA, standalone components, signals, RxJS, TailwindCSS/daisyUI
      model: sonnet
      can_write: true

    - name: flutter-mobile
      domain: Flutter 3.38, Dart 3.11, Riverpod, Firebase, cross-platform iOS/Android
      model: sonnet
      can_write: true

    - name: database-designer
      domain: PostgreSQL schema design, Firebase Firestore, migrations, ERD, indexing
      model: sonnet
      can_write: true

    - name: architect
      domain: System architecture, API contracts, sequence diagrams, ADRs, full-stack design
      model: sonnet
      can_write: true  # Writes architecture docs and diagrams

  # P2 — Domain specialists. Consulted by P1 agents on cross-cutting concerns.
  # Also dispatched directly for their specialty domain.
  p2_specialist:
    - name: a2ui-angular
      domain: A2UI (Agent-to-User Interface) renderer development in Angular 21.x
      model: sonnet
      can_write: true
      note: "Specialization of angular-spa for AI-to-UI payload rendering"

    - name: google-adk
      domain: Google ADK Python, Gemini models, SequentialAgent, ParallelAgent, ADK tools
      model: sonnet
      can_write: true
      note: "Specialization of agentic-ai-dev for Google ADK specifically"

    - name: mobile-developer
      domain: React Native, Swift/Kotlin native modules, mobile CI/CD, app store delivery
      model: sonnet
      can_write: true

    - name: frontend-design
      domain: Visual UI design, landing pages, dashboards, design systems, CSS animations
      model: sonnet
      can_write: true

    - name: deployment-engineer
      domain: CI/CD pipelines, Docker, Google Cloud Run, Flutter distribution, GitHub Actions
      model: sonnet
      can_write: true  # Writes Dockerfiles, workflow files, deploy scripts
      note: "GitHub Actions only — never generate cloudbuild.yaml or other CI tools"

    - name: terraform-specialist
      domain: Terraform for GCP, Cloud Run, Cloud SQL, Firestore, IAM, networking
      model: sonnet
      can_write: false  # Default permissionMode — review/plan only unless elevated
      note: "Infrastructure changes require explicit human approval before apply"

    - name: flutter-security-expert
      domain: Flutter secure storage, certificate pinning, GDPR/CCPA, mobile privacy compliance
      model: sonnet
      can_write: true
      note: "Run alongside flutter-mobile for any auth, storage, or data-privacy changes"

    - name: browser-testing
      domain: Browser automation, Chrome DevTools, E2E testing, performance profiling
      model: sonnet
      can_write: false  # Read + browser MCP only

    - name: threat-modeling-expert
      domain: STRIDE, PASTA, attack trees, security architecture review, risk assessment
      model: sonnet
      can_write: false  # Analysis and reporting only

  # P3 — Reviewers. Run post-implementation. Never dispatched as primary implementer.
  # Each reviewer targets a specific stack or cross-cutting concern.
  p3_reviewer:
    - name: spring-reactive-reviewer
      domain: Java 21 Spring Boot WebFlux reactive correctness, Result types, error handling
      can_write: false

    - name: nestjs-reviewer
      domain: NestJS 11.x module correctness, Prisma patterns, TypeScript type safety
      can_write: false

    - name: agentic-ai-reviewer
      domain: LangChain/LangGraph graph design, tool safety, agent correctness
      can_write: false

    - name: riverpod-reviewer
      domain: Flutter Riverpod provider types, ref usage, AsyncValue, state management
      can_write: false

    - name: postgresql-database-reviewer
      domain: PostgreSQL query optimization, schema safety, indexes, migration review
      can_write: false  # Read + Bash (for EXPLAIN ANALYZE) only

    - name: pgvector-schema-reviewer
      domain: pgvector migration review, vector column types, HNSW/IVFFlat index settings
      can_write: false
      note: "Extends postgresql-database-reviewer — run both for vector schema changes"

    - name: weaviate-schema-reviewer
      domain: Weaviate collection schema, vectorizer config, property types, module settings
      can_write: false

    - name: rag-pipeline-reviewer
      domain: RAG retrieval pipelines, embedding generation, chunking strategies, retrieval quality
      can_write: false

    - name: security-reviewer
      domain: OWASP Top 10, secrets detection, SSRF, injection, unsafe crypto — ALL stacks
      can_write: false
      note: "Highest conflict-resolution priority. Run on ANY auth, crypto, or input-handling change."

    - name: accessibility-auditor
      domain: WCAG 2.1 Flutter compliance, Semantics widgets, focus management, contrast
      can_write: false

    - name: code-reviewer
      domain: General code quality, security, maintainability — all languages
      can_write: false
      note: "Default reviewer when no stack-specific reviewer applies. Use as a baseline."

    - name: ui-standards-expert
      domain: Design tokens, theming, WCAG AA, responsive layout, Angular/Flutter UI compliance
      can_write: true  # Can apply fixes directly
      note: "Run on any UI component change to validate design system compliance"

    - name: silent-failure-hunter
      domain: Error handling review — catch blocks, fallback logic, swallowed exceptions
      can_write: false
      note: "Run on any PR that touches error handling, catch blocks, or fallback paths"

    - name: dedup-code-agent
      domain: Code duplication, unused code, dependency bloat, technical debt
      can_write: false

    - name: pr-test-analyzer
      domain: Test coverage quality, behavioral coverage, edge cases, critical paths
      can_write: false

    - name: output-evaluator
      domain: LLM-as-judge quality gate — correctness, completeness, safety of staged changes
      can_write: false
      note: "Returns PASS / NEEDS_REVISION / FAIL verdict. Block commit on FAIL."

    - name: reality-checker
      domain: Final UI/feature validation gate — requires screenshot evidence. Defaults to NEEDS WORK.
      can_write: false
      note: "Uses Chrome DevTools MCP. Only returns APPROVED with visual proof."

  # P4 — Utility agents. Support any tier for research, scaffolding, or one-off analysis.
  # These are tools, not owners — they do not drive tasks.
  p4_utility:
    - name: plan-challenger
      domain: Adversarial plan review — attacks plans across assumptions, scope, risk, timeline, alternatives
      can_write: false
      note: "Run before approving any non-trivial implementation plan."

    - name: code-simplifier
      domain: Complexity reduction — nesting, redundant abstractions, over-engineering
      can_write: false

    - name: comment-analyzer
      domain: Comment rot detection — outdated, misleading, or inaccurate code comments
      can_write: false

    - name: type-design-analyzer
      domain: TypeScript/Java/Dart type quality review — interfaces, sealed classes, Freezed models
      can_write: false

    - name: mermaid-expert
      domain: Mermaid diagram creation — flowcharts, sequences, ERDs, architectures
      can_write: false

    - name: error-detective
      domain: Runtime error investigation — logs, stack traces, crash analysis
      can_write: false

    - name: dx-optimizer
      domain: Developer experience — tooling setup, automation, onboarding friction
      can_write: false

    - name: skill-reviewer
      domain: Claude Code skill file quality — Iron Law, description completeness, MCP references
      can_write: false

    - name: tutorial-engineer
      domain: Step-by-step tutorials and educational content generated from code
      can_write: true  # Writes tutorial markdown files

    - name: output-evaluator
      domain: Also usable as a utility gate for intermediate agent outputs
      can_write: false

# ─────────────────────────────────────────────────────────────────────────────
# TASK DISTRIBUTION
# Maps file/signal patterns to primary agent + secondary reviewers.
# Match the FIRST applicable rule — patterns are evaluated top-to-bottom.
# ─────────────────────────────────────────────────────────────────────────────
task_distribution:

  # Java / Spring Boot
  - pattern: "*.java"
    signals: ["@RestController", "@Service", "@Repository", "pom.xml", "Spring annotations"]
    primary: java-spring-api
    secondary:
      - spring-reactive-reviewer    # Reactive correctness
      - security-reviewer           # Always on auth/controller changes
    notes: "Also dispatch postgresql-database-reviewer if JPA entities or schema are modified."

  - pattern: "pom.xml"
    primary: java-spring-api
    secondary:
      - security-reviewer           # Dependency CVE check

  # NestJS / Node.js
  - pattern: "*.ts"
    signals: ["@Controller", "@Injectable", "@Module", "@Guard", "NestJS decorators"]
    primary: nestjs-api
    secondary:
      - nestjs-reviewer
      - security-reviewer           # On auth guards, middleware, input DTOs
    notes: "If file is Angular (*.component.ts, *.service.ts in Angular project), use angular-spa instead."

  - pattern: "prisma/schema.prisma"
    primary: nestjs-api
    secondary:
      - postgresql-database-reviewer
      - security-reviewer

  # Python / FastAPI
  - pattern: "*.py"
    signals: ["FastAPI", "flask", "SQLAlchemy", "Pydantic", "alembic"]
    primary: python-dev
    secondary:
      - security-reviewer
    notes: "If file uses LangChain, LangGraph, or ADK — use agentic-ai-dev or google-adk instead."

  # Agentic AI (LangChain / LangGraph)
  - pattern: "*.py"
    signals: ["langchain", "langgraph", "StateGraph", "tool_calling", "BaseTool", "ChatPromptTemplate"]
    primary: agentic-ai-dev
    secondary:
      - agentic-ai-reviewer
      - security-reviewer           # Tool safety and prompt injection
    notes: "For Google ADK specifically (google-adk package), use google-adk agent instead."

  # Google ADK agents
  - pattern: "*.py"
    signals: ["google-adk", "SequentialAgent", "ParallelAgent", "google.adk"]
    primary: google-adk
    secondary:
      - agentic-ai-reviewer
      - security-reviewer

  # Angular / Frontend
  - pattern: "*.component.ts"
    primary: angular-spa
    secondary:
      - ui-standards-expert
      - accessibility-auditor       # For any interactive or visual components

  - pattern: "*.component.html"
    primary: angular-spa
    secondary:
      - ui-standards-expert
      - accessibility-auditor

  - pattern: "*.component.scss"
    primary: angular-spa
    secondary:
      - ui-standards-expert

  - pattern: "a2ui/**"
    signals: ["A2UI payload", "agent renderer", "JSON-to-UI"]
    primary: a2ui-angular
    secondary:
      - angular-spa                 # For framework correctness
      - security-reviewer           # A2UI payloads require input validation

  # Flutter / Dart
  - pattern: "*.dart"
    primary: flutter-mobile
    secondary:
      - riverpod-reviewer           # Always on Dart files using Riverpod
      - flutter-security-expert     # On auth, storage, network, permissions
    notes: "Run accessibility-auditor on screen widgets and interactive UI components."

  - pattern: "pubspec.yaml"
    primary: flutter-mobile
    secondary:
      - security-reviewer           # Dependency CVE check
      - flutter-security-expert

  # Database / SQL
  - pattern: "*.sql"
    primary: database-designer
    secondary:
      - postgresql-database-reviewer

  - pattern: "migrations/**"
    primary: database-designer
    secondary:
      - postgresql-database-reviewer  # Required — must return SAFE TO APPLY
      - security-reviewer             # On any auth/user data table changes

  - pattern: "alembic/**"
    primary: database-designer
    secondary:
      - postgresql-database-reviewer

  # Vector / Embedding
  - pattern: "*.py"
    signals: ["pgvector", "vector_store", "embedding", "HNSW", "IVFFlat"]
    primary: python-dev
    secondary:
      - pgvector-schema-reviewer
      - postgresql-database-reviewer
      - rag-pipeline-reviewer       # If file is a retrieval pipeline

  - pattern: "weaviate/**"
    signals: ["weaviate", "WeaviateClient", "collection.create", "vectorizer"]
    primary: python-dev
    secondary:
      - weaviate-schema-reviewer
      - rag-pipeline-reviewer

  # Infrastructure / DevOps
  - pattern: "*.tf"
    primary: terraform-specialist
    secondary:
      - security-reviewer           # IAM, networking, secrets
    notes: "Terraform changes require explicit human approval before `terraform apply`."

  - pattern: "Dockerfile"
    primary: deployment-engineer
    secondary:
      - security-reviewer

  - pattern: ".github/workflows/**"
    primary: deployment-engineer
    notes: "GitHub Actions only — see memory/feedback_ci_github_actions_only.md"

  - pattern: "docker-compose*.yml"
    primary: deployment-engineer
    secondary:
      - security-reviewer

  # React Native / Cross-platform mobile
  - pattern: "*.tsx"
    signals: ["React Native", "react-native", "expo"]
    primary: mobile-developer
    secondary:
      - security-reviewer

  # Architecture docs
  - pattern: "docs/architecture/**"
    primary: architect
    secondary:
      - plan-challenger             # Adversarial review on major architecture decisions

  - pattern: "docs/plans/**"
    primary: architect
    secondary:
      - plan-challenger

# ─────────────────────────────────────────────────────────────────────────────
# CROSS-CONSULTATION RULES
# When a primary agent is working, these define when it MUST consult a secondary.
# "consult" means: dispatch the secondary agent and incorporate its findings
# before marking the task complete.
# ─────────────────────────────────────────────────────────────────────────────
cross_consultation:

  java-spring-api:
    - when: "auth, JWT, OAuth2, security filter, CORS, or input validation changes"
      consult: security-reviewer
      required: true
    - when: "new JPA entity, schema change, or database migration"
      consult: postgresql-database-reviewer
      required: true
    - when: "reactive chain added or modified (Mono, Flux, WebClient)"
      consult: spring-reactive-reviewer
      required: true
    - when: "new REST endpoint or API contract change"
      consult: architect
      required: false  # Recommended for breaking changes

  nestjs-api:
    - when: "auth guard, JWT strategy, or input DTO validation added/modified"
      consult: security-reviewer
      required: true
    - when: "Prisma schema or database migration modified"
      consult: postgresql-database-reviewer
      required: true
    - when: "any NestJS module, controller, or service added/modified"
      consult: nestjs-reviewer
      required: true
    - when: "new API endpoint or contract change"
      consult: architect
      required: false

  python-dev:
    - when: "FastAPI auth route, JWT, API key handling, or input validation"
      consult: security-reviewer
      required: true
    - when: "SQLAlchemy model or Alembic migration"
      consult: postgresql-database-reviewer
      required: true
    - when: "LangChain/LangGraph imports present"
      consult: agentic-ai-reviewer
      required: true

  agentic-ai-dev:
    - when: "tool definition with external API calls or filesystem access"
      consult: security-reviewer
      required: true
      note: "Tool calls are high-risk injection surface — always security reviewed"
    - when: "graph state schema or Pydantic models change"
      consult: agentic-ai-reviewer
      required: true
    - when: "RAG retrieval pipeline added or modified"
      consult: rag-pipeline-reviewer
      required: true
    - when: "vector store integration (pgvector or Weaviate)"
      consult: [pgvector-schema-reviewer, weaviate-schema-reviewer]
      required: true

  google-adk:
    - when: "tool definition or external API integration"
      consult: security-reviewer
      required: true
    - when: "agent graph or orchestration pattern"
      consult: agentic-ai-reviewer
      required: true

  angular-spa:
    - when: "auth service, HTTP interceptor, or route guard"
      consult: security-reviewer
      required: true
    - when: "new component or UI layout"
      consult: ui-standards-expert
      required: true
    - when: "A2UI renderer or agent-to-UI payload handling"
      consult: [a2ui-angular, security-reviewer]
      required: true
    - when: "new screen or interactive element added"
      consult: accessibility-auditor
      required: false  # Required if WCAG compliance is project requirement

  flutter-mobile:
    - when: "auth flow, token storage, biometrics, or permissions"
      consult: [flutter-security-expert, security-reviewer]
      required: true
    - when: "Riverpod provider added or modified"
      consult: riverpod-reviewer
      required: true
    - when: "new screen with interactive elements"
      consult: accessibility-auditor
      required: false
    - when: "GDPR/CCPA data collection, analytics, or crash reporting"
      consult: flutter-security-expert
      required: true

  database-designer:
    - when: "any migration (always)"
      consult: postgresql-database-reviewer
      required: true  # Hard gate: must return SAFE TO APPLY
    - when: "vector column, embedding index, or pgvector extension"
      consult: pgvector-schema-reviewer
      required: true
    - when: "Weaviate collection schema"
      consult: weaviate-schema-reviewer
      required: true
    - when: "user data, auth tables, or PII columns"
      consult: security-reviewer
      required: true

  deployment-engineer:
    - when: "Dockerfile or container image change"
      consult: security-reviewer
      required: true
    - when: "CI/CD pipeline secret handling or environment variables"
      consult: security-reviewer
      required: true
    - when: "new GitHub Actions workflow"
      consult: security-reviewer
      required: false  # Recommended for workflows with external triggers

  terraform-specialist:
    - when: "IAM bindings, service account roles, or network firewall rules"
      consult: security-reviewer
      required: true
    - when: "Cloud SQL or database infrastructure"
      consult: postgresql-database-reviewer
      required: false

  architect:
    - when: "major architectural decision (new service, new data store, new pattern)"
      consult: plan-challenger
      required: true
      note: "Adversarial review surfaces blind spots before implementation starts"
    - when: "security-sensitive architecture (auth system, API gateway, data pipeline)"
      consult: [security-reviewer, threat-modeling-expert]
      required: true

  a2ui-angular:
    - when: "any agent payload renderer that accepts external JSON"
      consult: security-reviewer
      required: true
      note: "A2UI payloads are an injection surface — always validate and sanitize"

  mobile-developer:
    - when: "auth, token storage, biometrics"
      consult: security-reviewer
      required: true
    - when: "native module or platform channel"
      consult: flutter-security-expert
      required: false

# ─────────────────────────────────────────────────────────────────────────────
# CONFLICT RESOLUTION PRIORITY
# When two agents give conflicting guidance, the higher-priority agent wins.
# Priority is absolute within its domain (column 2). Outside its domain,
# defer to the domain-specific agent even if lower in the list.
# ─────────────────────────────────────────────────────────────────────────────
conflict_resolution_priority:
  # Rule: security-reviewer always wins on security matters across ALL stacks.
  # Rule: postgresql-database-reviewer always wins on schema/migration safety.
  # Rule: stack-specific reviewers win over general code-reviewer within their stack.

  - rank: 1
    agent: security-reviewer
    domain: "All security, auth, crypto, input validation, secret handling decisions"
    note: "No security finding can be overridden by another agent. Human approval required."

  - rank: 2
    agent: postgresql-database-reviewer
    domain: "Schema safety, migration reversibility, index correctness, query safety"
    note: "Must return SAFE TO APPLY before any migration is applied."

  - rank: 3
    agent: pgvector-schema-reviewer
    domain: "Vector schema decisions — defers to postgresql-database-reviewer on base schema issues"

  - rank: 4
    agent: spring-reactive-reviewer
    domain: "Java/Spring WebFlux reactive correctness within the Java stack"

  - rank: 5
    agent: nestjs-reviewer
    domain: "NestJS module/Prisma correctness within the NestJS stack"

  - rank: 6
    agent: agentic-ai-reviewer
    domain: "LangChain/LangGraph graph design and agent safety"

  - rank: 7
    agent: riverpod-reviewer
    domain: "Flutter Riverpod state management patterns"

  - rank: 8
    agent: flutter-security-expert
    domain: "Flutter-specific security and privacy compliance"

  - rank: 9
    agent: weaviate-schema-reviewer
    domain: "Weaviate collection schema correctness"

  - rank: 10
    agent: rag-pipeline-reviewer
    domain: "RAG pipeline retrieval quality and safety"

  - rank: 11
    agent: architect
    domain: "System-level architectural decisions — overrides implementers on structure"

  - rank: 12
    agent: threat-modeling-expert
    domain: "Threat model completeness — defers to security-reviewer on specific findings"

  - rank: 13
    agent: code-reviewer
    domain: "General code quality — lowest priority, overridden by all stack-specific reviewers"

# ─────────────────────────────────────────────────────────────────────────────
# QUALITY GATES
# Defines which agents must run at each lifecycle checkpoint.
# "required" = blocks progress if verdict is not PASS/APPROVED.
# "recommended" = should run, but does not hard-block.
# ─────────────────────────────────────────────────────────────────────────────
quality_gates:

  # Run before every git commit.
  pre_commit:
    description: "Minimum bar before committing any code change."
    required:
      - agent: output-evaluator
        condition: always
        note: "Returns PASS / NEEDS_REVISION / FAIL. Block commit on FAIL."
      - agent: silent-failure-hunter
        condition: "PR touches error handling, catch blocks, or fallback logic"
        note: "Zero tolerance for swallowed exceptions."
    recommended:
      - agent: code-reviewer
        condition: always
        note: "General quality baseline — run even if stack-specific reviewer is planned for pre_pr."
      - agent: comment-analyzer
        condition: "Files with significant comment blocks were modified"

  # Run before opening a Pull Request.
  pre_pr:
    description: "Stack-specific review and risk assessment before PR is created."
    required:
      - agent: code-reviewer
        condition: always
        note: "General review. Stack-specific reviewers below are additive, not replacements."
      - agent: spring-reactive-reviewer
        condition: "*.java files modified"
      - agent: nestjs-reviewer
        condition: "NestJS *.ts files modified"
      - agent: agentic-ai-reviewer
        condition: "LangChain/LangGraph files modified"
      - agent: riverpod-reviewer
        condition: "*.dart files with Riverpod modified"
      - agent: postgresql-database-reviewer
        condition: "SQL migrations or schema files modified"
        note: "Must return SAFE TO APPLY"
      - agent: pr-test-analyzer
        condition: always
        note: "Validates behavioral test coverage — not just line coverage."
      - agent: dedup-code-agent
        condition: "Feature adds more than 3 new files or 200+ lines"
        note: "Catch duplication before it merges."
    recommended:
      - agent: type-design-analyzer
        condition: "New TypeScript interfaces, Java records, or Dart Freezed models added"
      - agent: code-simplifier
        condition: "Any file exceeds 400 lines or has nesting depth > 4"
      - agent: ui-standards-expert
        condition: "Angular component or Flutter widget files modified"
      - agent: accessibility-auditor
        condition: "New Flutter screen or Angular component with interactive elements"

  # Required before merging to develop/main.
  pre_merge:
    description: "Final gates — these are hard blocks. Merge is not allowed until all required pass."
    required:
      - agent: security-reviewer
        condition: "Auth, JWT, crypto, input handling, or security-sensitive files modified"
        note: "Verdict must be: no CRITICAL or HIGH findings unresolved. Lock doc required."
      - agent: postgresql-database-reviewer
        condition: "Any database migration in the PR"
        note: "Must return SAFE TO APPLY. Includes reviewing rollback/down migration."
      - agent: pgvector-schema-reviewer
        condition: "pgvector schema or embedding index changes"
      - agent: weaviate-schema-reviewer
        condition: "Weaviate collection schema changes"
      - agent: flutter-security-expert
        condition: "Flutter auth, storage, or privacy-related changes"
      - agent: reality-checker
        condition: "UI feature or visual change"
        note: "Requires screenshot evidence. Defaults to NEEDS WORK — hard block without APPROVED."
      - agent: threat-modeling-expert
        condition: "New service, new auth system, or new external integration added"
        note: "Required for architectural security surface changes."
    recommended:
      - agent: plan-challenger
        condition: "Architectural changes that deviate from the approved plan"
      - agent: output-evaluator
        condition: "AI-generated or agent-assisted code paths"

  # Run after implementing a feature (before pre_pr gates).
  post_implementation:
    description: "Immediate feedback loop after completing implementation. Runs before pre_pr."
    required:
      - agent: code-reviewer
        condition: always
        note: "First pass — catches obvious issues before specialist reviewers run."
    recommended:
      - agent: spring-reactive-reviewer
        condition: "Java Spring files modified"
      - agent: nestjs-reviewer
        condition: "NestJS files modified"
      - agent: agentic-ai-reviewer
        condition: "Agentic AI files modified"
      - agent: riverpod-reviewer
        condition: "Flutter/Dart files modified"
      - agent: silent-failure-hunter
        condition: always
        note: "Always worth running — silent failures are common and hard to spot in review."
      - agent: comment-analyzer
        condition: "Implementation added significant comments or modified existing ones"

# ─────────────────────────────────────────────────────────────────────────────
# AGENT CAPABILITY MATRIX
# Authoritative list of which agents can write files vs. read only.
# Source of truth for orchestrators choosing isolation modes.
# ─────────────────────────────────────────────────────────────────────────────
capabilities:

  # Read-only agents: cannot create or modify source files.
  # Safe to run in parallel with active implementers — no write conflicts.
  read_only:
    - accessibility-auditor         # WCAG audit, read + analysis only
    - agentic-ai-reviewer           # Code review only
    - browser-testing               # Browser MCP only, no file writes
    - code-reviewer                 # Review only
    - code-simplifier               # Analysis only, no auto-fix
    - comment-analyzer              # Detection only
    - dedup-code-agent              # Detection only
    - dx-optimizer                  # Analysis/recommendations only
    - error-detective               # Investigation only
    - mermaid-expert                # Generates diagram text, does not write files
    - nestjs-reviewer               # Review only
    - output-evaluator              # Verdict only
    - pgvector-schema-reviewer      # Review + EXPLAIN ANALYZE (Bash) — no writes
    - plan-challenger               # Adversarial review only
    - postgresql-database-reviewer  # Review + EXPLAIN ANALYZE (Bash) — no writes
    - pr-test-analyzer              # Analysis only
    - rag-pipeline-reviewer         # Review only
    - reality-checker               # Screenshot validation, no writes
    - riverpod-reviewer             # Review only
    - security-reviewer             # Audit + Bash scan — no writes
    - silent-failure-hunter         # Detection only
    - skill-reviewer                # Review only
    - spring-reactive-reviewer      # Review only
    - terraform-specialist          # Review/plan by default (permissionMode: default)
    - threat-modeling-expert        # Analysis only
    - type-design-analyzer          # Analysis only
    - weaviate-schema-reviewer      # Review only

  # Write-capable agents: can create and modify source files.
  # Use worktree isolation when running in parallel to avoid conflicts.
  write:
    - a2ui-angular                  # Writes Angular A2UI renderer components
    - agentic-ai-dev                # Writes Python agent code
    - angular-spa                   # Writes Angular components, services, routes
    - architect                     # Writes ADRs, architecture docs, diagrams
    - database-designer             # Writes SQL migrations, schema files
    - deployment-engineer           # Writes Dockerfiles, GitHub Actions, deploy scripts
    - flutter-mobile                # Writes Dart/Flutter code
    - flutter-security-expert       # Writes security-hardened Flutter code
    - frontend-design               # Writes UI components and styles
    - google-adk                    # Writes Google ADK Python agents
    - java-spring-api               # Writes Java/Spring source files
    - mobile-developer              # Writes React Native / native module code
    - nestjs-api                    # Writes NestJS TypeScript source files
    - python-dev                    # Writes Python source files
    - tutorial-engineer             # Writes markdown tutorial files
    - ui-standards-expert           # Can apply design system fixes directly

# ─────────────────────────────────────────────────────────────────────────────
# DISPATCH EXAMPLES
# Concrete scenarios with primary agent and reviewer chain.
# Used as a reference when the CLAUDE.md table is too high-level.
# ─────────────────────────────────────────────────────────────────────────────
dispatch_examples:

  - scenario: "Writing a new Spring Boot REST endpoint"
    trigger: "New @RestController or @Service class"
    primary: java-spring-api
    reviewers:
      - spring-reactive-reviewer   # Reactive chain correctness
      - security-reviewer          # Input validation and auth
    notes: "If endpoint touches database: also run postgresql-database-reviewer."

  - scenario: "Adding a NestJS module with Prisma CRUD"
    trigger: "New @Module, @Controller, or Prisma schema change"
    primary: nestjs-api
    reviewers:
      - nestjs-reviewer
      - postgresql-database-reviewer
      - security-reviewer
    notes: "Check DTOs for class-validator decorators. Ensure no raw SQL in Prisma queries."

  - scenario: "Building a LangGraph agent with tool calling"
    trigger: "StateGraph, BaseTool, or tool_calling in Python files"
    primary: agentic-ai-dev
    reviewers:
      - agentic-ai-reviewer
      - security-reviewer
    notes: "Tool definitions are injection surfaces — security-reviewer is non-negotiable."

  - scenario: "Building a Google ADK multi-agent pipeline"
    trigger: "google-adk imports, SequentialAgent, or ParallelAgent"
    primary: google-adk
    reviewers:
      - agentic-ai-reviewer
      - security-reviewer

  - scenario: "Implementing a Flutter screen with Riverpod state"
    trigger: "New Flutter screen widget with provider(s)"
    primary: flutter-mobile
    reviewers:
      - riverpod-reviewer
      - accessibility-auditor
    notes: "If screen handles auth or storage: add flutter-security-expert."

  - scenario: "Designing a PostgreSQL schema migration"
    trigger: "New migration file (.sql or Alembic)"
    primary: database-designer
    reviewers:
      - postgresql-database-reviewer   # Hard gate: SAFE TO APPLY required
      - security-reviewer              # If migration touches user/auth tables

  - scenario: "Adding pgvector embeddings column and HNSW index"
    trigger: "pgvector extension, VECTOR column, or CREATE INDEX USING hnsw"
    primary: database-designer
    reviewers:
      - pgvector-schema-reviewer
      - postgresql-database-reviewer

  - scenario: "Building an Angular feature component"
    trigger: "New *.component.ts / *.component.html pair"
    primary: angular-spa
    reviewers:
      - ui-standards-expert
      - accessibility-auditor
    notes: "If component renders agent-generated JSON: use a2ui-angular as primary instead."

  - scenario: "Provisioning GCP Cloud Run with Terraform"
    trigger: "*.tf files with google_cloud_run_service resource"
    primary: terraform-specialist
    reviewers:
      - security-reviewer
    notes: "Terraform apply requires explicit human approval — terraform-specialist plans only."

  - scenario: "Setting up CI/CD pipeline"
    trigger: ".github/workflows/*.yml created or modified"
    primary: deployment-engineer
    reviewers:
      - security-reviewer
    notes: "GitHub Actions only. Never generate cloudbuild.yaml or other CI tools."

  - scenario: "Adding auth to any stack"
    trigger: "JWT, OAuth2, API key, session, or password handling in any file"
    primary: "[stack-appropriate implementer]"
    reviewers:
      - security-reviewer          # Always required
      - threat-modeling-expert     # Recommended for new auth systems
    notes: "security-reviewer verdict must be no CRITICAL/HIGH before merge."

  - scenario: "Building a RAG pipeline"
    trigger: "Retrieval chain, embedding generation, or vector store query code"
    primary: agentic-ai-dev
    reviewers:
      - rag-pipeline-reviewer
      - pgvector-schema-reviewer   # If using pgvector
      - weaviate-schema-reviewer   # If using Weaviate
      - security-reviewer          # Retrieval pipelines can leak data

  - scenario: "Designing system architecture for a new service"
    trigger: "New service, new data store, new integration point"
    primary: architect
    reviewers:
      - plan-challenger            # Adversarial review before implementation
      - threat-modeling-expert     # Security architecture surface
    notes: "Save approved plan to docs/plans/YYYY-MM-DD-<feature>.md before implementation."

  - scenario: "UI design system compliance audit"
    trigger: "Design token violations, hardcoded colors, or raw spacing values reported"
    primary: ui-standards-expert
    reviewers:
      - accessibility-auditor
    notes: "ui-standards-expert can apply fixes directly (write-capable)."

  - scenario: "Flutter security and privacy audit"
    trigger: "Secure storage, certificate pinning, GDPR consent, or crash reporting changes"
    primary: flutter-security-expert
    reviewers:
      - security-reviewer
    notes: "Run before any Flutter release targeting regulated markets."

  - scenario: "React Native / native module development"
    trigger: "React Native components, Swift/Kotlin native modules, or Expo code"
    primary: mobile-developer
    reviewers:
      - security-reviewer

  - scenario: "Browser-based E2E test or performance profiling"
    trigger: "Playwright, Puppeteer, or Chrome DevTools test automation"
    primary: browser-testing
    reviewers: []
    notes: "browser-testing is read-only — it validates but does not write application code."

  - scenario: "Code complexity or duplication review"
    trigger: "Files exceeding 400 lines, deep nesting, or suspected duplication"
    primary: "[stack implementer]"
    reviewers:
      - code-simplifier
      - dedup-code-agent
    notes: "Run after post_implementation gate, before pre_pr."

  - scenario: "Creating a Mermaid architecture diagram"
    trigger: "Request for flowchart, sequence, ERD, or component diagram"
    primary: mermaid-expert
    reviewers: []
    notes: "Read-only utility — outputs diagram text, does not write docs files itself."
